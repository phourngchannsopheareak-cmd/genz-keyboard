name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web keyboard
        run: |
          npm install
          npm run build

      - name: Copy web build into Android assets
        run: |
          rm -rf android/app/src/main/assets/keyboard
          mkdir -p android/app/src/main/assets/keyboard
          cp -r dist/* android/app/src/main/assets/keyboard/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: khmer-slang-keyboard
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Khmer Slang Keyboard (latest)
          body: Tap app-debug.apk below on your Android phone to install.
          files: android/app/build/outputs/apk/debug/app-debug.apk
