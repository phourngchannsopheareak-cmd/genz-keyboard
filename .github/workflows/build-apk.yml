name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web keyboard
        run: |
          npm install
          npm run build

      - name: Copy keyboard page into Android assets
        run: |
          rm -rf android/app/src/main/assets/keyboard
          mkdir -p android/app/src/main/assets/keyboard
          cp dist/ime.html android/app/src/main/assets/keyboard/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ensure a stable signing key exists
        run: |
          if [ ! -f android/app/genz.keystore ]; then
            keytool -genkeypair -v \
              -keystore android/app/genz.keystore \
              -alias genz \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass genzkeystore -keypass genzkeystore \
              -dname "CN=Genz Keyboard, OU=404 Studio, O=404 Studio, L=Phnom Penh, C=KH"
            echo "NEW_KEYSTORE=1" >> "$GITHUB_ENV"
          fi

      - name: Save the key back to the repo (first time only)
        if: env.NEW_KEYSTORE == '1'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f android/app/genz.keystore
          git commit -m "Add Genz Keyboard signing key [skip ci]"
          git push

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build signed APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Name the APK
        run: cp android/app/build/outputs/apk/release/app-release.apk genz-keyboard.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: genz-keyboard
          path: genz-keyboard.apk

      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Genz Keyboard (latest)
          body: Tap genz-keyboard.apk below on your Android phone to install.
          files: genz-keyboard.apk
